<head>

  <link href="https://jsdelivr.net" rel="stylesheet">
  
  <style>
    body {
      background-color: #06060c; 
      color: #ffffff;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed; 
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
      background-size: 550px 550px, 350px 350px, 250px 250px;
      background-position: 0 0, 40px 60px, 130px 270px;
      opacity: 0.7;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -3; 
      background: 
        radial-gradient(circle at 30% 20%, rgba(76, 29, 149, 0.4) 0%, transparent 40%),  
        radial-gradient(circle at 75% 40%, rgba(30, 58, 138, 0.4) 0%, transparent 45%),  
        radial-gradient(circle at 50% 80%, rgba(131, 24, 67, 0.3) 0%, transparent 35%),  
        radial-gradient(circle at 15% 70%, rgba(6, 78, 59, 0.2) 0%, transparent 30%);    
      filter: blur(80px); 
    }

    h1 {
       font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: calc(1.8rem + 1.5vw);
      font-weight: 800;
      letter-spacing: 2px;
      display: block;
      text-align: center;
      margin: 0 auto 3rem auto;
      background: linear-gradient(135deg, #a855f7 0%, #06b6d4 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
      transition: all 0.4s ease;
        width: 100%;
      text-align: center;
      display: inline-block;
    }

    h1:hover {
      transform: translateY(-5px);
      filter: drop-shadow(0px 0px 25px rgba(6, 182, 212, 0.8));
    }

    h2 {
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #e2e8f0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      transition: text-shadow 0.3s ease;
      width: 100%;
      text-align: center;
    }
    
    h2:hover {
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); 
    }

    .video-card {
      display: block;
      text-decoration: none;
      border-radius: 12px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(5px); 
      border: 1px solid rgba(168, 85, 247, 0.4);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2), inset 0 0 10px rgba(168, 85, 247, 0.1);
      transition: all 0.4s ease-in-out;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }

    .video-card:hover {
      transform: scale(1.02); 
      border: 1px solid rgba(6, 182, 212, 0.8);
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.6), inset 0 0 15px rgba(6, 182, 212, 0.3);
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      display: block;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    
    ::-webkit-scrollbar {
      width: 10px;
    }

   
    ::-webkit-scrollbar-track {
      background: #06060c; 
    }

   
    ::-webkit-scrollbar-thumb {
    
      background: linear-gradient(180deg, #a855f7 0%, #06b6d4 100%);
      border-radius: 10px; 
      border: 2px solid #06060c;
    }

   
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #b572f9 0%, #22d3ee 100%);
    }

  </style>
</head>
