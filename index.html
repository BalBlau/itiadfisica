<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>*ੈ✩‧₊˚Portafolio F&S*ੈ✩‧₊˚</title>
  <link href="https://jsdelivr.net" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
  <style>
    body {
      background-color: #06060c; 
      color: #ffffff;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed; 
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
      background-size: 550px 550px, 350px 350px, 250px 250px;
      background-position: 0 0, 40px 60px, 130px 270px;
      opacity: 0.7;
    }

    body::after {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      z-index: -3; 
      background: 
        radial-gradient(circle at 30% 20%, rgba(76, 29, 149, 0.4) 0%, transparent 40%),  
        radial-gradient(circle at 75% 40%, rgba(30, 58, 138, 0.4) 0%, transparent 45%),  
        radial-gradient(circle at 50% 80%, rgba(131, 24, 67, 0.3) 0%, transparent 35%),  
        radial-gradient(circle at 15% 70%, rgba(6, 78, 59, 0.2) 0%, transparent 30%);    
      filter: blur(80px); 
      animation: rotarNebulosa 120s linear infinite; 
    }

    @keyframes rotarNebulosa {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      
      background: linear-gradient(135deg, #a855f7 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      
      filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
      transition: all 0.4s ease;
      display: inline-block;
    }

    h1:hover {
      transform: translateY(-5px);
      filter: drop-shadow(0px 0px 25px rgba(6, 182, 212, 0.8));
    }

    h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #e2e8f0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      transition: text-shadow 0.3s ease;
    }
    
    h2:hover {
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); 
    }

    .video-card {
      display: inline-block;
      text-decoration: none;
      border-radius: 12px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(5px); 
      border: 1px solid rgba(168, 85, 247, 0.4);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2), inset 0 0 10px rgba(168, 85, 247, 0.1);
      transition: all 0.4s ease-in-out;
    }

    .video-card:hover {
      transform: scale(1.02); 
      border: 1px solid rgba(6, 182, 212, 0.8);
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.6), inset 0 0 15px rgba(6, 182, 212, 0.3);
    }

    .video-wrapper iframe {
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container-fluid text-center">
    <h1 class="mt-5 mb-5">Portafolio de física y Simulación</h1>
    
    <section class="video-item">
      
      <section class="d-flex flex-column align-items-center mb-5">
        <h2 class="mb-3">Domino Simulation</h2>
        <a href="https://youtu.be" target="_blank" class="video-card">
          <div class="video-wrapper">
            <iframe width="560" height="315" src="https://youtube.com" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen=""></iframe>
          </div>
        </a>
      </section>

      <section class="d-flex flex-column align-items-center mb-5">
        <h2 class="mb-3">Objects & Ramps</h2>
        <a href="https://youtu.be" target="_blank" class="video-card">
          <div class="video-wrapper">
            <iframe width="560" height="315" src="https://youtube.com" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen=""></iframe>
          </div>
        </a>
      </section>

      <section class="d-flex flex-column align-items-center mb-5">
        <h2 class="mb-3">Swing Simulation</h2>
        <a href="https://youtu.be" target="_blank" class="video-card">
          <div class="video-wrapper">
            <iframe width="560" height="315" src="https://youtube.com" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen=""></iframe>
          </div>
        </a>
      </section>

    </section>
  </div>

</body>
</html>
